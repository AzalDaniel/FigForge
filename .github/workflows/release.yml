name: Release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build and publish
# to PyPI via Trusted Publishing (OIDC) — no API tokens stored as secrets.
# One-time setup: register a "pending publisher" for `figforge` on PyPI with
# owner=AzalDaniel, repo=figforge, workflow=release.yml, environment=pypi.
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/figforge
    permissions:
      id-token: write # mandatory for Trusted Publishing; this is all the auth needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
